upstream backend {
    server backend:3000;
}

upstream meilisearch {
    server meilisearch:7700;
}

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), fullscreen=(self)" always;

    # Restrict large body size to export upload only
    location /api/export/upload {
        client_max_body_size 25g;
        # Keep same path rewriting as the generic /api/ block (drop /api prefix)
        proxy_pass http://backend/export/upload;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /api/;
        proxy_cookie_flags ~ secure httponly samesite=strict;
    }

    # Allow larger uploads for past exam files (backend multer limit: 200 MB)
    location /api/pastExam/upload {
        client_max_body_size 250m;
        proxy_pass http://backend/pastExam/upload;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /api/;
        proxy_cookie_flags ~ secure httponly samesite=strict;
    }

    location /api/ {
        proxy_pass http://backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Permissions-Policy;
        proxy_cookie_path / /api/;
        proxy_cookie_flags ~ secure httponly samesite=strict;
    }

    # Meilisearch proxy
    location /meili/ {
        proxy_pass http://meilisearch/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Permissions-Policy;
    }

    # JS/CSS may be rewritten at container start (Meili key injection),
    # so force revalidation to avoid stale cached bundles.
    location ~* \.(js|css)$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Long cache for static media that is never rewritten at runtime.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # On gère les fichiers envoyés par le backend
    location /files/ {
        internal;      # Seul le backend peut déclencher cette route
        root /app;     # Nginx cherchera dans /app/files/...
    }
}